name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Spotless check
        run: gradle spotlessCheck

      - name: Lint
        run: gradle lintDebug

      - name: Unit tests
        run: gradle testDebugUnitTest

      - name: Validate preview screenshots
        run: gradle validateDebugScreenshotTest

      - name: Assemble debug
        run: gradle assembleDebug

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: app/build/outputs/screenshot-test-results/**
          if-no-files-found: ignore
