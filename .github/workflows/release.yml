name: Release

on:
  push:
    branches: [main]
    paths:
      - "version.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < version.txt)"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version.txt must contain a semver MAJOR.MINOR.PATCH (got '$VERSION')"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tag_check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        if: steps.tag_check.outputs.skip == 'false'
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        if: steps.tag_check.outputs.skip == 'false'
        with:
          gradle-version: "8.13"

      - name: Decode keystore
        if: steps.tag_check.outputs.skip == 'false'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Assemble release APK
        if: steps.tag_check.outputs.skip == 'false'
        env:
          SPOTIFY_CLIENT_ID: ${{ vars.SPOTIFY_CLIENT_ID }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:assembleRelease

      - name: Stage APK
        if: steps.tag_check.outputs.skip == 'false'
        id: stage
        run: |
          SRC="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected APK at $SRC"
            ls -R app/build/outputs/apk || true
            exit 1
          fi
          DST="spotify-pacer-${{ steps.version.outputs.version }}.apk"
          cp "$SRC" "$DST"
          echo "apk=$DST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.apk }}
          fail_on_unmatched_files: true
